{% extends 'base.html' %}
{% block content %}
<div class="col-md-4 offset-md-4">
    <div class="card card-body">
        <h5>Editar Producto #{{ product.id }}</h5>
        <form action="/edit/{{ product.id }}" method="POST">
            <label>Nombre:</label>
            <input type="text" name="name" value="{{ product.name }}" class="form-control mb-2">
            <label>Precio:</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control mb-2">
            <label>Stock:</label>
            <input type="number" name="stock" value="{{ product.stock }}" class="form-control mb-2">
            <button class="btn btn-success w-100">Actualizar</button>
            <a href="/" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
