{% extends 'base.html' %}
{% block content %}
<div class="row">
    <!-- Formulario -->
    <div class="col-md-4">
        <div class="card card-body">
            <h5>Agregar Producto</h5>
            <form action="/create" method="POST">
                <input type="text" name="name" placeholder="Nombre" class="form-control mb-2" required>
                <input type="number" step="0.01" name="price" placeholder="Precio" class="form-control mb-2" required>
                <input type="number" name="stock" placeholder="Stock inicial" class="form-control mb-2" required>
                <button class="btn btn-primary w-100">Guardar</button>
            </form>
        </div>
    </div>
    <!-- Tabla -->
    <div class="col-md-8">
        <table class="table table-striped table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>Bs. {{ p.price }}</td>
                    <td>{{ p.stock }}</td>
                    <td>
                        <a href="/edit/{{ p.id }}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="/delete/{{ p.id }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Borrar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
